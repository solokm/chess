<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Chess Trainer - Free Edition</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --bg-color: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --accent: #3b82f6; --board-size: 500px; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .auth-bar { display: flex; align-items: center; gap: 15px; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); }
        .modal-content { background-color: var(--panel-bg); margin: 10% auto; padding: 35px; border-radius: 12px; width: 320px; text-align: center; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        
        .controls { background: var(--panel-bg); padding: 20px; border-radius: 12px; display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .app-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        #myBoard { width: var(--board-size); border: 5px solid #334155; border-radius: 4px; }
        
        .info-panel { display: flex; flex-direction: column; gap: 15px; width: 350px; }
        .card { background: var(--panel-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); min-height: 80px; font-size: 1.1rem; border-left: 5px solid var(--accent); }
        
        button { cursor: pointer; padding: 10px 20px; border-radius: 8px; border: none; background: var(--accent); color: white; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        
        #logout-btn { background: #ef4444; display: none; }
        select { padding: 10px; border-radius: 8px; background: #0f172a; color: white; border: 1px solid #334155; cursor: pointer; }
        
        strong { color: #facc15; font-size: 1.2rem; }
        .highlight-selected { background: rgba(255, 255, 0, 0.5) !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">Pro Chess Trainer</h1>
        <div class="auth-bar">
            <span id="user-email" style="color: #94a3b8; font-size: 0.9rem;">Guest Mode</span>
            <button id="login-trigger" onclick="openModal()">Sign Up / Log In</button>
            <button id="logout-btn" onclick="handleLogout()">Log Out</button>
        </div>
    </div>

    <div class="controls">
        <select id="mode-select" onchange="promptUser()">
            <option value="learn">Stage 1: Learn</option>
            <option value="practice">Stage 2: Practice</option>
        </select>
        
        <select id="color-select">
            <option value="white">Play White</option>
            <option value="black">Play Black</option>
        </select>

        <input type="text" id="opening-search" list="openings-list" placeholder="Search thousands of openings...">
        <datalist id="openings-list"></datalist>
        
        <button onclick="loadVariation()">Start Training</button>
    </div>

    <div class="app-container">
        <div id="board-container"><div id="myBoard"></div></div>
        <div class="info-panel">
            <div id="status-box" class="card">Welcome! Search an opening to begin.</div>
            <div id="theory-box" class="card">Theory and move notes will appear here.</div>
        </div>
    </div>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title">Create Account</h2>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-password" placeholder="Password">
            <button onclick="handleAuth()" id="auth-submit-btn" style="width: 100%;">Submit</button>
            <p style="font-size: 0.85rem; color: #94a3b8; cursor: pointer; margin-top: 15px;" onclick="toggleAuthMode()" id="auth-toggle-text">Already have an account? Log In</p>
            <button onclick="closeModal()" style="background: transparent; color: #94a3b8; margin-top: 10px;">Close</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://hohjxacsebgqczyemkaf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_jgnDeyEWO_tZe1objEDibg_nMYU9lWP';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let openingDictionary = new Map();
        let board = null; let game = new Chess();
        let targetLine = []; let currentMoveIndex = 0;
        let selectedSquare = null;
        let userColor = 'white'; let isSignUpMode = true;

        // Auth Logic
        function openModal() { document.getElementById('authModal').style.display = 'block'; }
        function closeModal() { document.getElementById('authModal').style.display = 'none'; }
        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('modal-title').innerText = isSignUpMode ? "Create Account" : "Log In";
            document.getElementById('auth-submit-btn').innerText = isSignUpMode ? "Sign Up" : "Log In";
        }
        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { error } = isSignUpMode ? await supabaseClient.auth.signUp({ email, password }) : await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else closeModal();
        }
        async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }

        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('user-email').innerText = session.user.email;
                document.getElementById('login-trigger').style.display = 'none';
                document.getElementById('logout-btn').style.display = 'block';
            }
            initApp();
        });

        async function initApp() {
            const datalist = document.getElementById('openings-list');
            datalist.innerHTML = ""; openingDictionary.clear();

            // Fetch ALL openings from your table (No bouncer restrictions)
            const { data: dbOpenings } = await supabaseClient.from('openings').select('*');
            if (dbOpenings) {
                dbOpenings.forEach(op => {
                    const label = `⭐ ${op.variation_name}`;
                    openingDictionary.set(label, { type: 'custom', data: op });
                    let opt = document.createElement('option'); opt.value = label; datalist.appendChild(opt);
                });
            }

            // Fetch Lichess ECO
            const volumes = ['a', 'b', 'c', 'd', 'e'];
            for (const v of volumes) {
                try {
                    const res = await fetch(`https://raw.githubusercontent.com/lichess-org/chess-openings/master/${v}.tsv`);
                    const txt = await res.text();
                    txt.split('\n').forEach(line => {
                        const r = line.split('\t');
                        if (r.length < 3 || r[0] === 'eco') return;
                        const label = `[${r[0]}] ${r[1]}`;
                        openingDictionary.set(label, { type: 'eco', moves: r[2], name: r[1] });
                        let opt = document.createElement('option'); opt.value = label; datalist.appendChild(opt);
                    });
                } catch(e) {}
            }

            if (!board) {
                board = Chessboard('myBoard', { 
                    draggable: true, position: 'start', onDrop: onDrop,
                    onSquareClick: onSquareClick,
                    onSnapEnd: () => board.position(game.fen()),
                    pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png' 
                });
            }
        }

        function onDrop(source, target) {
            let temp = new Chess(game.fen());
            let move = temp.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';
            let expected = getExpected(currentMoveIndex);
            if (move.san !== expected) {
                document.getElementById('status-box').innerText = "Wrong move! Try again.";
                return 'snapback';
            }
            game.move(move); currentMoveIndex++;
            document.getElementById('status-box').innerText = "Correct!";
            if (currentMoveIndex < targetLine.length) setTimeout(makeCpuMove, 600);
            else document.getElementById('status-box').innerText = "Line Complete!";
        }

        function onSquareClick(square) {
            const clearSelection = () => {
                if (selectedSquare) {
                    const selectedElement = document.querySelector(`[data-square="${selectedSquare}"]`);
                    if (selectedElement) selectedElement.classList.remove('highlight-selected');
                }
                selectedSquare = null;
            };

            if (!selectedSquare) {
                const piece = game.get(square);
                if (!piece || piece.color !== game.turn()) return;
                selectedSquare = square;
                const squareElement = document.querySelector(`[data-square="${square}"]`);
                if (squareElement) squareElement.classList.add('highlight-selected');
                return;
            }

            const source = selectedSquare;
            clearSelection();
            const result = onDrop(source, square);
            if (result === 'snapback') board.position(game.fen());
        }

        function getExpected(idx) {
            let m = targetLine[idx];
            return (typeof m === 'object') ? m.m : m;
        }

        function promptUser() {
            if (currentMoveIndex >= targetLine.length) return;
            const mode = document.getElementById('mode-select').value;
            const expected = getExpected(currentMoveIndex);
            if (mode === 'learn') document.getElementById('status-box').innerHTML = `Learn Mode: Play <strong>${expected}</strong>`;
            else document.getElementById('status-box').innerText = "Your turn...";
        }

        function makeCpuMove() {
            game.move(getExpected(currentMoveIndex));
            board.position(game.fen());
            currentMoveIndex++; promptUser();
        }

        function loadVariation() {
            const val = document.getElementById('opening-search').value;
            if (!openingDictionary.has(val)) return alert("Select an opening!");
            const op = openingDictionary.get(val);
            userColor = document.getElementById('color-select').value;
            
            if (op.type === 'custom') {
                if (typeof op.data.moves === 'string') {
                    targetLine = op.data.moves.split(' ').filter(m => !m.includes('.') && m.trim() !== "");
                } else {
                    targetLine = op.data.moves;
                }
                document.getElementById('theory-box').innerText = op.data.intro || "Custom Line Loaded.";
            } else {
                targetLine = op.moves.split(' ').filter(m => !m.includes('.'));
                document.getElementById('theory-box').innerText = op.name;
            }
            game.reset(); currentMoveIndex = 0;
            board.orientation(userColor); board.start();
            if (userColor === 'black') setTimeout(makeCpuMove, 800);
            else promptUser();
        }
    </script>
</body>
</html>
